<div class="recents-strip" id="recents-strip"
     data-current-project="{{project_hash}}"
     data-current-session="{{session_uuid}}"></div>

<!-- Regen errors are system-emitted: they must be visible on page load even
     when the fragment below is stale or missing, so the banner lives in the
     layout, not the fragment. -->
<section id="regen-errors-banner" class="regen-errors-banner" hidden
         data-project="{{project_hash}}" data-session="{{session_uuid}}">
  <h2 class="regen-errors-title">Dashboard updates</h2>
  <ol class="regen-errors-list"></ol>
</section>

{{fragment}}

<footer>
  <span class="regen-metrics" id="regen-metrics"
        title="Rebuilds recorded for this chat: per-regen average tokens, average rebuild time, total cost, and the model(s) used."></span>
</footer>

<script>
// Deferred scripts (freshness.js) run before DOMContentLoaded; this gate keeps
// window.Freshness available to everything below.
function _bootDashboardShell() {
  // _PROJECT_HASH_RE / _SESSION_UUID_RE on the server keep these free of
  // quotes, backslashes, and angle brackets.
  const PROJECT = "{{project_hash}}";
  const SESSION = "{{session_uuid}}";
  const STATUS_URL = "/api/dashboard/" + PROJECT + "/" + SESSION + ".json";

  const chipEl   = document.getElementById("status-chip");
  const ageEl    = document.getElementById("status-age");
  const btn      = document.getElementById("rebuild-btn");
  const bannerEl = document.getElementById("regen-errors-banner");
  const bannerList = bannerEl ? bannerEl.querySelector(".regen-errors-list") : null;
  const metricsEl = document.getElementById("regen-metrics");

  let initialized        = false;
  let lastDashboardMtime = null;
  let lastState          = null;
  let currentRegenSince  = null;
  let pollTimer          = null;
  let ageTimer           = null;

  let lastBannerKey = null;

  function errorCard(e) {
    const p = e.presentation || {};
    const resolved = e.resolvedAt != null;
    const when = window.Freshness
      ? window.Freshness.fmtAge((Date.now() / 1000) - e.at) + " ago"
      : "";
    const resolvedNote = resolved && window.Freshness
      ? '<span class="regen-error-when">resolved ' +
        window.Freshness.fmtAge(Math.max(0, e.resolvedAt - e.at)) + ' later</span>'
      : "";
    const actions = (p.actions || []).map(a => {
      if (a.kind === "command") {
        return '<span class="regen-error-cmd"><code>' + escapeHtml(a.value) +
          '</code><button type="button" class="btn-quiet regen-error-copy" data-copy="' +
          escapeHtml(a.value) + '" aria-label="Copy command">Copy</button></span>';
      }
      if (a.kind === "copy") {
        return '<button type="button" class="btn-quiet regen-error-copy" data-copy="' +
          escapeHtml(a.value) + '">' + escapeHtml(a.label) + '</button>';
      }
      const external = /^https?:/i.test(a.value || "");
      return '<a class="btn-quiet regen-error-link" href="' + escapeHtml(a.value) + '"' +
        (external ? ' target="_blank" rel="noopener noreferrer"' : "") + '>' +
        escapeHtml(a.label) + '</a>';
    }).join("");
    return (
      '<li class="regen-error sev-' + escapeHtml(p.severity || "warning") +
          (resolved ? ' resolved' : '') +
          '" data-error-id="' + escapeHtml(e.id) + '">' +
        '<div class="regen-error-head">' +
          '<span class="regen-error-title">' +
            escapeHtml(p.title || "A dashboard update did not finish.") + '</span>' +
          '<span class="regen-error-when">' + escapeHtml(when) + '</span>' +
          resolvedNote +
          '<button class="btn-quiet regen-error-dismiss" type="button"' +
                  ' title="Acknowledge: moves this entry out of the active list">' +
            '✕ dismiss' +
          '</button>' +
        '</div>' +
        (p.body && !resolved ? '<p class="regen-error-body">' + escapeHtml(p.body) + '</p>' : "") +
        (actions && !resolved ? '<div class="regen-error-actions">' + actions + '</div>' : "") +
        ((p.detail || (p.diagnostics || []).length)
          ? '<details class="regen-error-detail"><summary>Technical detail' +
            '<button type="button" class="btn-quiet regen-error-copy" data-copy="' +
              escapeHtml((p.diagnostics || [])
                .map(d => d.label + ": " + d.value).join("\n") +
                (p.detail ? "\n\n" + p.detail : "")) +
              '" aria-label="Copy technical detail">Copy</button></summary>' +
            ((p.diagnostics || []).length
              ? '<dl class="regen-error-diag">' + p.diagnostics.map(d =>
                  '<dt>' + escapeHtml(d.label) + '</dt><dd>' +
                  escapeHtml(d.value) + '</dd>').join("") + '</dl>'
              : "") +
            (p.detail ? '<pre>' + escapeHtml(p.detail) + '</pre>' : "") +
            '</details>'
          : "") +
      '</li>'
    );
  }

  function renderErrorsBanner(errors) {
    if (!bannerEl || !bannerList) return;
    const unacked = (errors || []).filter(e => e.ackedAt == null);
    const live = unacked.filter(e => e.resolvedAt == null);
    const resolved = unacked.filter(e => e.resolvedAt != null);
    // Rebuilding on every poll would close whatever the reader has open, such
    // as a Technical detail; rebuild only when the set of messages changes.
    const key = JSON.stringify([live.map(e => e.id), resolved.map(e => e.id)]);
    if (key === lastBannerKey) return;
    lastBannerKey = key;
    if (unacked.length === 0) {
      bannerEl.hidden = true;
      bannerList.innerHTML = "";
      return;
    }
    const newestFirst = (a, b) => b.at - a.at;
    let htmlOut = live.slice().sort(newestFirst).map(errorCard).join("");
    if (resolved.length) {
      const noun = resolved.length === 1 ? "problem" : "problems";
      htmlOut +=
        '<li class="regen-errors-fold">' +
          '<button type="button" class="btn-quiet" data-fold-toggle>▸ ' +
            resolved.length + ' earlier ' + noun + ' resolved on their own</button>' +
          '<ol class="regen-errors-resolved" hidden>' +
            resolved.slice().sort(newestFirst).map(errorCard).join("") +
          '</ol>' +
        '</li>';
    }
    bannerList.innerHTML = htmlOut;
    bannerEl.hidden = false;
  }

  if (bannerList) {
    bannerList.addEventListener("click", async (ev) => {
      const foldBtn = ev.target.closest("[data-fold-toggle]");
      if (foldBtn) {
        const list = foldBtn.nextElementSibling;
        list.hidden = !list.hidden;
        foldBtn.textContent = (list.hidden ? "▸" : "▾") + foldBtn.textContent.slice(1);
        return;
      }
      const copyBtn = ev.target.closest("[data-copy]");
      if (copyBtn) {
        // Inside <summary>, a plain click would also toggle the section.
        ev.preventDefault();
        const text = copyBtn.getAttribute("data-copy") || "";
        try { await navigator.clipboard.writeText(text); } catch (_) { /* not fatal */ }
        const original = copyBtn.textContent;
        copyBtn.textContent = "Copied";
        setTimeout(() => { copyBtn.textContent = original; }, 1200);
        return;
      }
      const dismissBtn = ev.target.closest(".regen-error-dismiss");
      if (!dismissBtn) return;
      const li = dismissBtn.closest("li.regen-error");
      if (!li) return;
      const errorId = li.getAttribute("data-error-id");
      const project = bannerEl.getAttribute("data-project");
      const session = bannerEl.getAttribute("data-session");
      dismissBtn.disabled = true;
      try {
        const r = await fetch(
          "/api/dashboard/" + project + "/" + session + "/error/" + errorId + "/acknowledge",
          { method: "POST", headers: { "Content-Type": "application/json" } }
        );
        if (!r.ok) throw new Error("HTTP " + r.status);
        li.remove();
        if (bannerList.children.length === 0) {
          bannerEl.hidden = true;
        }
        poll();
      } catch (_) {
        dismissBtn.disabled = false;
      }
    });
  }

  function fmtTokens(n) {
    if (n == null) return "?";
    return n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, "") + "k" : String(n);
  }

  function renderMetrics(m) {
    if (!metricsEl) return;
    if (!m || !m.regens) { metricsEl.textContent = ""; return; }
    const avgS = m.avg_wall_ms != null ? (m.avg_wall_ms / 1000).toFixed(1) + "s" : "?";
    const parts = [
      m.regens + " regen" + (m.regens === 1 ? "" : "s"),
      "avg " + fmtTokens(Math.round(m.input_tokens / m.regens)) + " in / " +
        fmtTokens(Math.round(m.output_tokens / m.regens)) + " out tokens",
      "avg " + avgS,
    ];
    if (m.cost_usd != null && m.cost_usd > 0) parts.push("$" + m.cost_usd.toFixed(2) + " total");
    if (m.models) parts.push(m.models.split(",").join(", "));
    metricsEl.textContent = parts.join(" · ");
  }

  function updatePendingLead(state) {
    const lead = document.getElementById("ccd-pending-lead");
    if (!lead) return;
    lead.textContent =
      state === "running" ? "Generating your dashboard…"
      : state === "failed" ? "That generation didn’t finish; see the note above."
      : state === "gone" ? "This chat no longer exists."
      : "Waiting for the first reply…";
  }

  function render(info) {
    if (!window.Freshness) return;
    chipEl.innerHTML = window.Freshness.chipHtml(info, { showCurrent: true });
    lastState = window.Freshness.classify(info).state;
    if (btn) {
      const running = lastState === "running";
      btn.disabled = running;
      btn.textContent = running ? "↻ rebuilding…" : "↻ rebuild";
    }
    lastDashboardMtime = info.dashboardMtime;
    updatePendingLead(lastState);
    renderErrorsBanner(info.regenErrors);
    renderMetrics(info.metrics);
    tickAge();
  }

  // Local ticker: advances the "Xs ago" label and the running chip's age
  // between polls without re-fetching.
  function tickAge() {
    if (lastDashboardMtime != null) {
      const ageS = (Date.now() / 1000) - lastDashboardMtime;
      ageEl.textContent = window.Freshness
        ? window.Freshness.fmtAge(ageS) + " ago"
        : "–";
    } else {
      ageEl.textContent = "–";
    }
    if (lastState === "running" && currentRegenSince != null &&
        window.Freshness && chipEl.firstChild) {
      const child = chipEl.firstChild;
      const prefix = (child.textContent || "").split(" · ")[0];
      if (prefix && child.classList && child.classList.contains("running")) {
        child.textContent = prefix + " · " +
          window.Freshness.fmtAge((Date.now() / 1000) - currentRegenSince);
      }
    }
  }

  let lastETag = null;
  let gone = false;

  async function poll() {
    if (gone) return;
    try {
      const r = await fetch(STATUS_URL, {
        cache: "no-store",
        headers: lastETag ? { "If-None-Match": lastETag } : {},
      });
      if (r.status === 304) { tickAge(); return; }
      if (r.status === 404) {
        // The transcript itself is gone (deleted chat or a mistyped id).
        gone = true;
        chipEl.innerHTML = '<span class="badge failed" ' +
          'title="No transcript exists for this chat id.">chat not found</span>';
        if (btn) btn.disabled = true;
        updatePendingLead("gone");
        clearTimeout(pollTimer);
        clearInterval(ageTimer);
        return;
      }
      if (!r.ok) throw new Error("HTTP " + r.status);
      lastETag = r.headers.get("ETag");
      const info = await r.json();
      currentRegenSince = info.regen && info.regen.since != null ? info.regen.since : null;

      // A dashboard newly appeared (null → value) or was regenerated (mtime
      // advanced): hard-reload to show it. The `initialized` gate keeps the
      // first poll from reloading.
      if (initialized &&
          info.dashboardMtime != null &&
          (initialDashboardMtime == null || info.dashboardMtime > initialDashboardMtime)) {
        location.reload();
        return;
      }
      render(info);
    } catch (e) {
      chipEl.innerHTML = '<span class="badge failed" title="' +
        escapeHtml(e.message) + '">⚠ server unreachable</span>';
    }
  }

  function schedule() {
    if (gone) return;
    clearTimeout(pollTimer);
    // The status endpoint is local and in-memory, so fast polling is cheap;
    // hidden tabs back off.
    const next = document.hidden ? 10000 : (lastState === "running" ? 1000 : 2000);
    pollTimer = setTimeout(async () => { await poll(); schedule(); }, next);
  }

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && initialized) { poll(); schedule(); }
  });

  let initialDashboardMtime = null;

  if (btn) {
    btn.addEventListener("click", async () => {
      if (!window.Freshness) return;
      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = "↻ requested";
      try {
        await window.Freshness.triggerRebuild(PROJECT, SESSION);
        setTimeout(async () => { await poll(); schedule(); }, 250);
      } catch (e) {
        btn.textContent = "⚠ error";
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
      }
    });
  }

  poll().then(() => {
    if (gone) return;
    initialDashboardMtime = lastDashboardMtime;
    initialized = true;
    schedule();
    ageTimer = setInterval(tickAge, 1000);
  });
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", _bootDashboardShell);
} else {
  _bootDashboardShell();
}
</script>
