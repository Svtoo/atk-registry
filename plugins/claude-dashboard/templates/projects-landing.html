<style>
  .projects { display: grid; grid-template-columns: 1fr; gap: 0.6rem; }
  @media (min-width: 720px) { .projects { grid-template-columns: 1fr 1fr; } }
  .project {
    min-width: 0;
    padding: 0.85rem 1rem;
    text-decoration: none; color: inherit; display: block;
    transition: border-color 0.12s, transform 0.12s;
  }
  .project:hover { border-color: var(--accent); transform: translateY(-1px); }
  .project .label {
    font-size: 1.05rem; font-weight: 600; margin-bottom: 0.2rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .project .hash {
    font-family: var(--mono);
    font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .project .row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.78rem; color: var(--muted);
  }
  .project .stats { display: flex; gap: 0.6rem; }
  .project .stats strong { color: var(--fg); }
  .project .arrow { color: var(--accent); font-weight: 600; }
  .project .stats .wt-count {
    color: var(--muted);
    font-family: var(--mono);
  }
  .project .stats .wt-count strong { color: var(--fg); }
</style>

<div class="stat-row">
  <div class="stat surface"><div class="stat-value" id="stat-projects">–</div><div class="stat-label">projects</div></div>
  <div class="stat surface"><div class="stat-value" id="stat-chats">–</div><div class="stat-label">total chats</div></div>
  <div class="stat surface"><div class="stat-value stat-value--ok" id="stat-dash">–</div><div class="stat-label">with dashboards</div></div>
  <div class="stat surface"><div class="stat-value stat-value--sm" id="stat-recent">–</div><div class="stat-label">last activity</div></div>
</div>

<div class="projects" id="projects">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<script>
async function refresh() {
  try {
    const r = await fetch("/api/projects.json", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const projects = await r.json();

    document.getElementById("stat-projects").textContent = projects.length;
    document.getElementById("stat-chats").textContent = projects.reduce((s, p) => s + p.chatCount, 0);
    document.getElementById("stat-dash").textContent = projects.reduce((s, p) => s + p.withDashboards, 0);
    document.getElementById("stat-recent").textContent =
      projects[0] && window.Freshness ? window.Freshness.fmtDate(projects[0].lastActivityIso) : "—";
    if (window.Freshness) {
      window.Freshness.stampUpdated();
      window.Freshness.setPageStatus(true);
    }

    const container = document.getElementById("projects");
    if (projects.length === 0) {
      container.innerHTML = `<div class="empty">No projects with chat history yet.</div>`;
      return;
    }
    container.innerHTML = projects.map(p => {
      const wtCount = p.worktrees ? p.worktrees.length : 0;
      const wtStat = wtCount > 0
        ? `<span class="wt-count">+<strong>${wtCount}</strong> ${wtCount === 1 ? "worktree" : "worktrees"}</span>`
        : "";
      return `
        <a class="project surface" href="/${encodeURIComponent(p.hash)}/">
          <div class="label">${escapeHtml(p.label)}</div>
          <div class="hash">${escapeHtml(p.rootPath || p.hash)}</div>
          <div class="row">
            <div class="stats">
              <span><strong>${p.chatCount}</strong> chat${p.chatCount === 1 ? "" : "s"}</span>
              <span class="ok-count"><strong>${p.withDashboards}</strong> with dashboard${p.withDashboards === 1 ? "" : "s"}</span>
              ${wtStat}
              <span>${window.Freshness ? window.Freshness.fmtDate(p.lastActivityIso) : ""}</span>
            </div>
            <div class="arrow">→</div>
          </div>
        </a>
      `;
    }).join("");
  } catch (e) {
    if (window.Freshness) window.Freshness.setPageStatus(false);
    document.getElementById("projects").innerHTML =
      `<div class="err">Server unreachable: ${escapeHtml(e.message)}. Run <code>atk start claude-dashboard</code></div>`;
  }
}

async function refreshMetrics() {
  try {
    const r = await fetch("/api/metrics.json", { cache: "no-store" });
    if (!r.ok) return;
    const m = await r.json();
    const el = document.getElementById("metrics-total");
    if (!el) return;
    if (!m || !m.regens || !window.Freshness) { el.textContent = ""; return; }
    const cost = m.cost_usd != null && m.cost_usd > 0 ? " · $" + m.cost_usd.toFixed(2) : "";
    el.textContent = " · " + m.regens + " regens total · "
      + window.Freshness.fmtTokens(m.input_tokens) + " in / "
      + window.Freshness.fmtTokens(m.output_tokens) + " out" + cost;
  } catch (_) { /* totals are best-effort */ }
}

refresh();
refreshMetrics();
setInterval(refresh, 30_000);
setInterval(refreshMetrics, 30_000);
</script>
