<span class="status-group" id="status-group" role="status">
  <span id="status-chip"></span>
  <time class="age" id="status-age" title="Time since the dashboard was last written.">–</time>
</span>
<button type="button" id="rebuild-btn" class="btn-quiet"
        data-session="{{session_uuid}}"
        data-project="{{project_hash}}"
        title="Re-run the subagent to regenerate this dashboard from the latest transcript.">
  ↻ rebuild
</button>
