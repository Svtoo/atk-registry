schema_version: "2026-01-23"
name: claude-dashboard
description: Per-chat executive dashboard for Claude Code sessions. Runs a localhost server that browses ~/.claude/projects/ and serves a top-level projects landing, a per-project chat index, and per-session dashboards the agent maintains. Claude-specific because it reads Claude Code's chat-history layout (project hash dirs + session UUID JSONLs) and targets the Claude Code Browser pane.
maturity: verified

vendor:
  name: Oleksandr (Sasha) Antoshchenko
  url: https://github.com/oantoshchenko

service:
  type: script

ports:
  - port: 7878
    name: dashboard
    protocol: http
    description: HTTP server serving the projects landing, per-project indexes, and per-session dashboards

env_vars:
  - name: CLAUDE_PROJECTS_DIR
    required: false
    description: Override the path to the Claude Code projects directory. Defaults to ~/.claude/projects.
  - name: CCD_MODEL
    required: false
    default: "sonnet"
    description: Model alias passed to `claude -p` for dashboard regeneration (e.g. sonnet, haiku).
  - name: CCD_LOG_LEVEL
    required: false
    default: "INFO"
    description: INFO (normal) or DEBUG. DEBUG additionally dumps the full prompt (system + user message) the model receives, per regen, into runtime/server.log.
  - name: CCD_REGEN_TIMEOUT
    required: false
    default: "180"
    description: Wall-clock seconds before a wedged `claude -p` regeneration is killed.
  - name: CCD_PREVIEW_PANE
    required: false
    default: "true"
    description: "Auto-open this chat's dashboard in the Claude Code Browser pane (default true). A UserPromptSubmit hook asks the agent, once per session, to open this chat's dashboard URL directly in the pane, and to reopen it on request. Set to false to turn the Browser-pane integration off entirely; the server and per-chat dashboard regeneration are unaffected, and no open instruction is injected."

lifecycle:
  install: ./install.sh
  uninstall: ./uninstall.sh
  start: ./start.sh
  stop: ./stop.sh
  status: curl -sf "http://127.0.0.1:${PORT:-7878}/api/projects.json" -o /dev/null
  health_endpoint: http://localhost:7878/api/projects.json
  logs: tail -f runtime/server.log
