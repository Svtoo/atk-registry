schema_version: "2026-01-23"
name: claude-dashboard
description: Per-chat executive dashboard for Claude Code sessions. Runs a localhost server that browses ~/.claude/projects/ and serves a top-level projects landing, a per-project chat index, and per-session dashboards the agent maintains. Claude-specific because it reads Claude Code's chat-history layout (project hash dirs + session UUID JSONLs) and targets the Claude Code preview pane.
maturity: verified

vendor:
  name: Oleksandr (Sasha) Antoshchenko
  url: https://github.com/oantoshchenko

service:
  type: script

ports:
  - port: 7878
    name: dashboard
    protocol: http
    description: HTTP server serving the projects landing, per-project indexes, and per-session dashboards

env_vars:
  - name: CLAUDE_PROJECTS_DIR
    required: false
    description: Override the path to the Claude Code projects directory. Defaults to ~/.claude/projects.
  - name: CCD_MODEL
    required: false
    default: "sonnet"
    description: Model alias passed to `claude -p` for dashboard regeneration (e.g. sonnet, haiku).
  - name: CCD_N_TURNS
    required: false
    default: "6"
    description: How many recent chat turns to feed into each regeneration prompt.
  - name: CCD_MAX_TRANSCRIPT_WORDS
    required: false
    default: "20000"
    description: Word budget for the recent transcript fed to each regen. Older whole turns are dropped to fit; the most recent turn is always kept in full. 0 disables (use only CCD_N_TURNS).
  - name: CCD_REGEN_TIMEOUT
    required: false
    default: "180"
    description: Wall-clock seconds before a wedged `claude -p` regeneration is killed.

lifecycle:
  install: ./install.sh
  uninstall: ./uninstall.sh
  start: ./start.sh
  stop: ./stop.sh
  status: curl -sf "http://127.0.0.1:${PORT:-7878}/api/projects.json" -o /dev/null
  health_endpoint: http://localhost:7878/api/projects.json
  logs: tail -f runtime/server.log
