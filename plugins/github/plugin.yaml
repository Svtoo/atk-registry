schema_version: "2026-01-23"
name: github
description: GitHub integration via MCP — search repos, read code, file issues, open PRs, and review changes from chat.

vendor:
  name: GitHub
  url: https://github.com/github/github-mcp-server
  docs: https://github.com/github/github-mcp-server#readme

env_vars:
  - name: GITHUB_TOKEN
    required: true
    secret: true
    description: Personal access token or GitHub App token with repo, issues, and pull_requests scopes.

  - name: GITHUB_HOST
    required: false
    default: "github.com"
    description: GitHub hostname. Use the default (github.com) for public GitHub, or set to your GitHub Enterprise Server hostname (e.g. github.mycompany.com).

mcp:
  transport: stdio
  command: npx
  args:
    - "-y"
    - "@github/mcp-server"
  env:
    - GITHUB_TOKEN
    - GITHUB_HOST

