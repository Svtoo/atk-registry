schema_version: "2026-01-23"
name: github
description: GitHub integration via MCP — search repos, read code, file issues, open PRs, and review changes from chat.
maturity: verified

vendor:
  name: GitHub
  url: https://github.com/github/github-mcp-server
  docs: https://github.com/github/github-mcp-server#readme

env_vars:
  - name: GITHUB_PERSONAL_ACCESS_TOKEN
    required: true
    secret: true
    description: Personal access token or GitHub App token with repo, issues, and pull_requests scopes.

  - name: GITHUB_HOST
    required: false
    description: "GitHub Enterprise Server base URL including scheme (e.g. https://github.mycompany.com). Leave unset for public github.com."

lifecycle:
  install: ./install.sh
  uninstall: ./uninstall.sh
  start: ./start.sh
  stop: ./stop.sh
  status: docker ps --filter "name=atk-github-mcp" --filter "status=running" --format '{{.Names}}' | grep -q "atk-github-mcp"

mcp:
  transport: stdio
  command: docker
  args:
    - "exec"
    - "-i"
    - "atk-github-mcp"
    - "/server/github-mcp-server"
    - "stdio"
  env:
    - GITHUB_PERSONAL_ACCESS_TOKEN
    - GITHUB_HOST

