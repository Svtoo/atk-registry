schema_version: '2026-01-23'
plugins:
- name: codanna
  path: plugins/codanna
  description: Semantic code-intelligence tool — gives AI assistants instant call
    graphs, dependency analysis, and semantic search across a codebase via MCP.
- name: fetch
  path: plugins/fetch
  description: Web content fetching via MCP — retrieve any URL and receive clean Markdown
    output optimised for LLM analysis and quoting.
- name: git-local
  path: plugins/git-local
  description: Inspect and perform safe Git operations on local repositories via MCP
    — no remote auth required.
- name: github
  path: plugins/github
  description: GitHub integration via MCP — search repos, read code, file issues,
    open PRs, and review changes from chat.
- name: gitlab
  path: plugins/gitlab
  description: Search projects, issues and MRs, read files, and automate common GitLab
    workflows via the official GitLab Duo MCP server.
- name: google-workspace
  path: plugins/google-workspace
  description: Google Workspace MCP — search Gmail, read Drive files, manage Calendar
    events, edit Docs and Sheets from any AI assistant.
- name: langfuse
  path: plugins/langfuse
  description: Open-source LLM observability and tracing platform
- name: notion
  path: plugins/notion
  description: Notion integration via MCP — search pages, read and write content,
    manage databases, and keep docs in sync.
- name: openmemory
  path: plugins/openmemory
  description: Persistent memory layer for AI agents with semantic search and MCP
    integration
- name: piper
  path: plugins/piper
  description: Local text-to-speech using Piper neural voices with MCP integration.
- name: playwright
  path: plugins/playwright
  description: Browser automation using Microsoft Playwright's MCP server. Enables
    LLMs to interact with web pages, take screenshots, and execute JavaScript via
    structured accessibility snapshots.
- name: slack
  path: plugins/slack
  description: Slack integration via MCP — list channels, read history, post messages,
    manage threads, and look up users.
