      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://help.figma.com/hc/en-us/articles/32132100833559-Guide-to-the-Figma-MCP-server
      (maintainer: Figma)
      Install command: npx -y @figma/mcp-server

      Required env vars:
        FIGMA_API_TOKEN (required): personal access token from Figma account
