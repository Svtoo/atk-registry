schema_version: "2.0"
project: atk-registry-top20
description: >
  Top 20 high-leverage ATK plugin candidates. Each task is independent.
  Developer agents build, tester agents break — separate roles, no confirmation bias.

process:
  developer_agent: auggie
  developer_flags:
    - "--print"
    - "--model"
    - "sonnet4.6"
    - "--rules"
    - "/Users/oleksandrantoshchenko/ws/public/ai-engineer-toolset/ai-assistant/AGENTS.md"
    - "--workspace-root"
    - "/Users/oleksandrantoshchenko/ws/public/atk-registry"
    - "--permission"
    - "bash:allow"
    - "--dont-save-session"
  tester_agent: auggie
  tester_flags:
    - "--print"
    - "--model"
    - "sonnet4.6"
    - "--rules"
    - "/Users/oleksandrantoshchenko/ws/public/ai-engineer-toolset/ai-assistant/AGENTS.md"
    - "--workspace-root"
    - "/Users/oleksandrantoshchenko/ws/public/atk-registry"
    - "--permission"
    - "bash:allow"
    - "--dont-save-session"
  worktree_base: /tmp/ralph-worktrees
  branch_prefix: "plugin/"
  max_cycles: 5

tasks:
  - id: "001"
    name: github
    description: |
      Work with repos, code, PRs and issues from chat: search, read, file issues,
      open PRs, review changes.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/github/github-mcp-server (maintainer: GitHub)
      Install command: npx -y @github/mcp-server

      Required env vars:
        GITHUB_TOKEN (required): personal access token or GitHub App token with
          repo, issues, and pull_requests scopes.

      MCP capabilities to verify:
        - search_repositories, get_file_contents, list_commits
        - create_issue, update_issue, list_issues
        - create_pull_request, get_pull_request, list_pull_requests
        - create_or_update_file (write path)
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "002"
    name: gitlab
    description: |
      Search projects, issues and MRs, read files, and automate common GitLab
      workflows from chat.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://docs.gitlab.com/user/gitlab_duo/model_context_protocol/mcp_server/
      (maintainer: GitLab)
      Install command: npx -y @gitlab/mcp-server (or the binary from the GitLab Duo MCP page)

      Required env vars:
        GITLAB_TOKEN (required): personal access token with api + read_user scopes.
        GITLAB_URL (optional, default https://gitlab.com): base URL for self-hosted instances.

      MCP capabilities to verify:
        - list_projects, get_project, search_projects
        - list_issues, create_issue, update_issue
        - list_merge_requests, create_merge_request, get_merge_request
        - get_file, list_directory
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "003"
    name: git-local
    description: |
      Inspect branches/commits/diffs/tags and perform safe Git operations in the
      current workspace — no remote auth required.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/modelcontextprotocol/servers/tree/main/src/git
      (maintainer: Model Context Protocol org)
      Install command: uvx mcp-server-git

      Required env vars: none. The server operates on the repository path passed
      as argument; no credentials required for local-only operations.

      MCP capabilities to verify:
        - git_log, git_diff, git_status, git_show
        - git_branch (list), git_checkout (safe branches only)
        - verify read-only operations do not modify working tree
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "004"
    name: filesystem
    description: |
      Browse, read, and write files/folders you allow, so the assistant can work
      with local project artifacts.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
      (maintainer: Model Context Protocol org)
      Install command: npx -y @modelcontextprotocol/server-filesystem

      Required env vars:
        ALLOWED_PATHS (required): colon-separated list of absolute paths the
          server may read/write. Example: /Users/me/projects:/tmp

      MCP capabilities to verify:
        - read_file, write_file, list_directory, create_directory
        - move_file, search_files, get_file_info
        - verify that paths outside ALLOWED_PATHS are rejected
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "005"
    name: fetch
    description: |
      Fetch a URL and return clean, token-friendly content (typically Markdown)
      for analysis and quoting.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
      (maintainer: Model Context Protocol org)
      Install command: uvx mcp-server-fetch

      Required env vars: none.
      Optional env vars:
        USER_AGENT (optional): custom User-Agent string sent with requests.

      MCP capabilities to verify:
        - fetch: fetch a URL and return Markdown (not raw HTML)
        - test with a real public URL (e.g., https://example.com)
        - verify JSON responses are returned in readable form
        - verify unreachable URLs produce a clear error (not a hang)
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "006"
    name: slack
    description: |
      Search channels/threads, summarize discussions, and draft/send messages
      (with your permissions).

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/zencoderai/slack-mcp-server (maintainer: Zencoder)
      Install command: npx -y @zencoderai/slack-mcp-server

      Required env vars:
        SLACK_BOT_TOKEN (required): bot OAuth token (xoxb-…) with channels:read,
          channels:history, chat:write, users:read scopes at minimum.
        SLACK_TEAM_ID (required): Slack workspace/team identifier.

      MCP capabilities to verify:
        - list_channels, get_channel_history, search_messages
        - post_message (to an allowed test channel)
        - get_user_profile
        - verify token scope errors surface clearly
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "007"
    name: notion
    description: |
      Search, read, and update Notion pages (often in Markdown) so the assistant
      can keep docs in sync.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/makenotion/notion-mcp-server (maintainer: Notion)
      Install command: npx -y @notionhq/notion-mcp-server

      Required env vars:
        NOTION_API_TOKEN (required): Notion internal integration token with
          read_content + update_content capabilities granted to the workspace.

      MCP capabilities to verify:
        - search (full-text across pages/databases)
        - get_page, get_block_children
        - create_page, update_page properties
        - query_database
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "008"
    name: atlassian
    description: |
      Create/search/update Jira issues and read/update Confluence pages from chat.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/atlassian/atlassian-mcp-server (maintainer: Atlassian)
      Install command: npx -y @atlassian/mcp-server

      Required env vars:
        ATLASSIAN_URL (required): base URL, e.g. https://myorg.atlassian.net
        ATLASSIAN_EMAIL (required): account email used for API auth.
        ATLASSIAN_API_TOKEN (required): API token from id.atlassian.com.

      MCP capabilities to verify:
        - jira_search (JQL), jira_get_issue, jira_create_issue, jira_update_issue
        - confluence_search, confluence_get_page, confluence_update_page
        - verify authentication failures return actionable error messages
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "009"
    name: google-workspace
    description: |
      Find emails/files, summarize threads/docs, create events, and update
      Docs/Sheets/Drive content.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/taylorwilsdon/google_workspace_mcp
      (maintainer: taylorwilsdon)
      Install command: uvx google-workspace-mcp

      Required env vars:
        GOOGLE_CLIENT_ID (required): OAuth 2.0 client ID from Google Cloud Console.
        GOOGLE_CLIENT_SECRET (required): OAuth 2.0 client secret.
        GOOGLE_REFRESH_TOKEN (required): long-lived refresh token; scopes needed:
          gmail.readonly, drive, calendar, docs, sheets.

      MCP capabilities to verify:
        - gmail_search, gmail_get_message
        - drive_search, drive_get_file_content
        - calendar_list_events, calendar_create_event
        - docs_get_document, sheets_get_values
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "010"
    name: microsoft-365
    description: |
      Search and manage Microsoft 365 resources (Teams, SharePoint, OneDrive,
      Entra, etc.) via Microsoft Graph API.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/merill/lokka (maintainer: Merill Fernando)
      Install command: npx -y lokka-mcp

      Required env vars:
        AZURE_CLIENT_ID (required): Entra app registration client ID.
        AZURE_CLIENT_SECRET (required): client secret for the app registration.
        AZURE_TENANT_ID (required): Entra tenant ID.

      MCP capabilities to verify:
        - list_users, get_user_profile
        - list_teams, get_team_channels, get_channel_messages
        - list_drives, get_drive_item, search_drive
        - verify missing Graph permissions produce clear, actionable errors
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []


  - id: "011"
    name: sentry
    description: |
      Retrieve and analyze Sentry issues, stack traces, and recent regressions
      to speed up debugging.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/getsentry/sentry-mcp-stdio (maintainer: Sentry)
      Install command: npx -y @sentry/mcp-server-stdio

      Required env vars:
        SENTRY_AUTH_TOKEN (required): Sentry auth token with project:read,
          event:read, and issue:read scopes.
        SENTRY_ORG (required): Sentry organization slug.

      MCP capabilities to verify:
        - list_projects, list_issues (with filters), get_issue
        - get_event (with full stack trace), list_releases
        - search_issues (by query string, e.g., is:unresolved)
        - verify expired/invalid token produces a clear error
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "012"
    name: datadog
    description: |
      Query dashboards, incidents, and traces/metrics so the assistant can help
      triage and explain outages.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/GeLi2001/datadog-mcp-server (maintainer: GeLi2001)
      Install command: npx -y datadog-mcp-server

      Required env vars:
        DD_API_KEY (required): Datadog API key.
        DD_APP_KEY (required): Datadog application key with metrics_read,
          monitors_read, incidents_read scopes.
        DD_SITE (optional, default datadoghq.com): Datadog site (e.g., datadoghq.eu).

      MCP capabilities to verify:
        - query_metrics (timeseries query), list_monitors, get_monitor
        - list_incidents, get_incident
        - list_dashboards, get_dashboard
        - verify invalid API key returns a clear authentication error
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "013"
    name: redis
    description: |
      Browse/search keys, inspect values, and manage Redis data safely for
      troubleshooting and ops.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/redis/mcp-redis (maintainer: Redis)
      Install command: uvx mcp-redis  (or pip install mcp-redis && python -m mcp_redis)

      Required env vars:
        REDIS_URL (required): Redis connection URL, e.g. redis://localhost:6379/0
          or rediss://user:pass@host:6380/0 for TLS.

      MCP capabilities to verify:
        - get, set, del, exists, type
        - keys (pattern scan), scan (cursor-based)
        - hget, hgetall, hset (hash ops)
        - lrange (list ops), smembers (set ops)
        - verify REDIS_URL connection failures produce a clear error
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "014"
    name: supabase
    description: |
      Create/query tables, manage projects, and deploy edge functions from chat
      against Supabase.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/supabase-community/supabase-mcp
      (maintainer: Supabase community)
      Install command: npx -y @supabase/mcp-server

      Required env vars:
        SUPABASE_URL (required): project URL, e.g. https://<project>.supabase.co
        SUPABASE_SERVICE_KEY (required): service role key (not the anon key).

      MCP capabilities to verify:
        - list_tables, describe_table, execute_sql (SELECT only by default)
        - list_functions (edge functions), invoke_function
        - list_buckets (storage), get_object
        - verify that DML operations require explicit confirmation if enforced
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "015"
    name: postgresql
    description: |
      Inspect schema and run controlled queries so the assistant can answer
      questions about your data.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/modelcontextprotocol/servers-archived/tree/main/src/postgres
      (maintainer: Model Context Protocol org; archived reference implementation)
      Install command: npx -y @modelcontextprotocol/server-postgres

      Required env vars:
        DATABASE_URL (required): PostgreSQL connection string, e.g.
          postgresql://user:pass@localhost:5432/mydb

      MCP capabilities to verify:
        - list_tables, describe_table (columns, types, constraints)
        - execute_query (SELECT statements)
        - verify write operations (INSERT/UPDATE/DELETE) are blocked or
          require explicit opt-in
        - verify invalid DATABASE_URL produces a clear connection error
