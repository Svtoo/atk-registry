      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://docs.stripe.com/mcp (maintainer: Stripe)
      Install command: npx -y @stripe/mcp-server

      Required env vars:
        STRIPE_SECRET_KEY (required): Stripe secret API key (sk_live_… or
