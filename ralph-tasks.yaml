  - id: "017"
    name: kubernetes
    description: |
      Inspect cluster resources (pods, deployments, logs) and help with routine
      k8s workflows.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/containers/kubernetes-mcp-server
      (maintainer: containers org)
      Install command: npx -y kubernetes-mcp-server  (or go install)

      Required env vars:
        KUBECONFIG (optional, default ~/.kube/config): path to kubeconfig file.
        KUBE_CONTEXT (optional): kubeconfig context to use.

      MCP capabilities to verify:
        - list_namespaces, list_pods (with namespace filter), get_pod
        - get_pod_logs (with tail/since options)
        - list_deployments, get_deployment, describe_deployment
        - list_services, list_configmaps
        - verify read-only mode blocks exec/delete by default
    status: pending
    worker_id: null
    branch: null
    dev_cycles: 0
    started_at: null
    completed_at: null
    bugs: []
    suggestions: []

  - id: "018"
    name: airtable
    description: |
      Read/write Airtable bases, tables, and records so the assistant can
      automate lightweight workflows.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/domdomegg/airtable-mcp-server
      (maintainer: domdomegg)
      Install command: npx -y airtable-mcp-server

      Required env vars:
        AIRTABLE_API_KEY (required): personal access token with data.records:read
