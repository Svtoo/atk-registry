      and troubleshooting.

      Plugin type: MCP-only (no background service). Uses stdio transport.
      Upstream: https://github.com/modelcontextprotocol/servers-archived/tree/main/src/sqlite
      (maintainer: Model Context Protocol org; archived reference implementation)
      Install command: npx -y @modelcontextprotocol/server-sqlite

      Required env vars:
        DB_PATH (required): absolute path to the SQLite database file.

      MCP capabilities to verify:
        - list_tables, describe_table (columns, types, constraints)
        - execute_query (SELECT statements)
        - verify write operations are blocked or require opt-in
        - verify non-existent DB_PATH produces a clear error
    status: pending
    worker_id: null
